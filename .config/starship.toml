"$schema" = 'https://starship.rs/config-schema.json'

# ╭───────────────────────────────────────────────────────────────────────────╮
# │  ☠  H4CKER HUD  —  no user/host, just signal.                              │
# │  Left:  what + where + git intel + toolchain                              │
# │  Right: live HUD  →  jobs · last-cmd time · RAM% · clock                   │
# │  Needs a Nerd Font (MonaspiceNe). Colors follow the active theme.         │
# ╰───────────────────────────────────────────────────────────────────────────╯
add_newline = true
command_timeout = 1000
palette = 'hacker'

format = """
[╭](bold green)[─](dim)\
[ 󰚌 ](bold mint)\
$directory\
$git_branch\
$git_metrics\
$git_status\
$nodejs$python$rust$golang$java$c$docker_context\
$package\
$line_break\
[╰─](bold green)$status$character"""

# Right-aligned HUD keeps the command line uncluttered.
right_format = """$jobs$cmd_duration${custom.ram_low}${custom.ram_mid}${custom.ram_high}$time"""

# ANSI-relative palette: colors are named (not hex) so the prompt automatically
# follows the active terminal theme — switch themes with `theme <name>` and the
# whole prompt recolors. Each role maps to a different ANSI slot for contrast.
[palettes.hacker]
green = "bright-green"   # frame · git added · prompt char
neon  = "green"          # directory path
mint  = "cyan"           # skull sigil · language versions
lime  = "magenta"        # package version
cyan  = "blue"           # docker context
red   = "bright-red"     # git branch · errors
amber = "yellow"         # git status · timing · jobs
dim   = "bright-black"   # clock · secondary HUD text

# ── Where ─────────────────────────────────────────────────────────────────────
[directory]
style = "bold neon"
read_only = "  "
read_only_style = "bold red"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
home_symbol = "~"
format = '[ $path]($style)[$read_only]($read_only_style)'

# ── Git intel ─────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold red"
format = '[ ⇢ ](dim)[$symbol$branch]($style)'

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([ +$added]($added_style))([ -$deleted]($deleted_style))'

[git_status]
style = "bold amber"
format = '[ $all_status$ahead_behind]($style)'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?'
stashed = '≡'
modified = '!'
staged = '+'
renamed = '»'
deleted = '✘'

# ── Toolchain (shown only in relevant projects) ───────────────────────────────
[nodejs]
symbol = " "
style = "bold mint"
format = '[( $symbol$version)]($style)'
[python]
symbol = " "
style = "bold mint"
format = '[( $symbol$version( $virtualenv))]($style)'
[rust]
symbol = " "
style = "bold mint"
format = '[( $symbol$version)]($style)'
[golang]
symbol = " "
style = "bold mint"
format = '[( $symbol$version)]($style)'
[java]
symbol = " "
style = "bold mint"
format = '[( $symbol$version)]($style)'
[c]
symbol = " "
style = "bold mint"
format = '[( $symbol$version)]($style)'
[docker_context]
symbol = " "
style = "bold cyan"
format = '[( $symbol$context)]($style)'
[package]
symbol = "󰏗 "
style = "bold lime"
format = '[( $symbol$version)]($style)'
disabled = false

# ── Line 2: exit code + prompt sigil ──────────────────────────────────────────
[status]
disabled = false
symbol = '✘ '
sigint_symbol = '󰂭 '
signal_symbol = '⚡'
format = '[\[$symbol$status\]](bold red)[─](bold green)'
map_symbol = true

[character]
success_symbol = '[λ](bold green)'    # INSERT mode, last cmd ok
error_symbol   = '[λ](bold red)'      # INSERT mode, last cmd failed
vimcmd_symbol  = '[Λ](bold amber)'    # NORMAL mode (capital Λ + block cursor)

# ── Right HUD ─────────────────────────────────────────────────────────────────
[jobs]
symbol = '󰜎 '
style = "bold amber"
number_threshold = 1
format = '[$symbol$number]($style)  '

[cmd_duration]
min_time = 500
style = "bold amber"
format = '[󱎫 $duration]($style)  '

# RAM gauge — color-shifts green→amber→red. The value (STARSHIP_RAM_PCT) is
# computed once per prompt by a zsh precmd hook in .zshrc; these three modules
# just pick the color band. Exactly one fires per prompt.
[custom.ram_low]
description = "RAM usage < 60% (green)"
when = 'test "${STARSHIP_RAM_PCT:-0}" -lt 60'
command = 'echo "${STARSHIP_RAM_PCT:-0}%"'
shell = ["sh", "--norc"]
symbol = '󰍛 '
style = "bold green"
format = '[$symbol$output]($style)  '

[custom.ram_mid]
description = "RAM usage 60–84% (amber)"
when = 'p="${STARSHIP_RAM_PCT:-0}"; test "$p" -ge 60 && test "$p" -lt 85'
command = 'echo "${STARSHIP_RAM_PCT:-0}%"'
shell = ["sh", "--norc"]
symbol = '󰍛 '
style = "bold amber"
format = '[$symbol$output]($style)  '

[custom.ram_high]
description = "RAM usage ≥ 85% (red)"
when = 'test "${STARSHIP_RAM_PCT:-0}" -ge 85'
command = 'echo "${STARSHIP_RAM_PCT:-0}%"'
shell = ["sh", "--norc"]
symbol = '󰍛 '
style = "bold red"
format = '[$symbol$output]($style)  '

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bold dim"
format = '[ $time]($style)'
