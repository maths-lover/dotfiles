# mpv.conf - high-quality video for IINA (and standalone mpv) on Apple Silicon.
#
# IINA renders the video itself, so output options (vo / gpu-api / gpu-context)
# are intentionally omitted - IINA ignores them. Everything below (decoding,
# scaling, debanding, interpolation, cache, audio) IS applied by IINA's renderer.
# Tuned for a 4K display (note: a scaled "looks like 1440p" mode makes macOS
# render at 5120x2880 internally, so good scalers still pay off).

# ---- Decoding ----------------------------------------------------------------
# Hardware decode via VideoToolbox. "auto-safe" only uses hwdec for codecs known
# to decode correctly, falling back to software otherwise (avoids glitches).
hwdec=auto-safe

# ---- Scaling (the big quality win when upscaling to 5K) ----------------------
# EWA Lanczos (sharp) for luma + chroma upscaling; Mitchell for downscaling.
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
# Dither to the display bit depth so high-bit-depth sources do not band.
dither-depth=auto

# ---- Debanding ---------------------------------------------------------------
# Smooths gradient banding common in compressed 4K/HDR. Raise iterations/grain
# for more smoothing at more GPU cost.
deband=yes
deband-iterations=2
deband-threshold=40
deband-range=16
deband-grain=24

# ---- Motion / smoothness -----------------------------------------------------
# Resample to the display refresh (kills A/V drift) and interpolate away 24fps
# judder. interpolation is the most expensive option here: if you ever see
# dropped frames at 4K, comment out the next two lines first.
video-sync=display-resample
interpolation=yes
tscale=oversample

# ---- HDR ---------------------------------------------------------------------
# Harmless on SDR; helps if a source is HDR. IINA also drives macOS EDR itself.
tone-mapping=bt.2390
hdr-compute-peak=yes

# ---- Cache (smooth high-bitrate local + network playback) --------------------
cache=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB
demuxer-readahead-secs=20

# ---- Audio -------------------------------------------------------------------
audio-channels=auto          # surround passthrough or a sane downmix
volume-max=130               # allow boosting quiet sources

# ---- Runtime state -----------------------------------------------------------
# Keep resume/watch-later data OUT of this version-controlled config directory.
watch-later-directory=~/.local/state/mpv/watch_later
save-position-on-quit=yes
